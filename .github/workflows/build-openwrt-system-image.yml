#============================================================================================
# https://github.com/ophub/amlogic-s9xxx-openwrt
# Description: Build OpenWrt system image from source
#============================================================================================

name: Build OpenWrt system image

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      source_branch:
        description: "Select the source branch"
        required: false
        default: "openwrt_main"
        type: choice
        options:
          - openwrt_main
          - lede_master
          - immortalwrt_master

      openwrt_board:
        description: "Select device board"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - amlogic
          - rockchip
          - s905x3
          - s905x
          - s912
          - s922x

      openwrt_kernel:
        description: "Select kernel version"
        required: false
        default: "6.12.y_6.18.y"
        type: choice
        options:
          - 5.10.y
          - 5.15.y
          - 6.1.y
          - 6.6.y
          - 6.12.y
          - 6.18.y
          - 6.12.y_6.18.y

env:
  FEEDS_CONF: config/${{ inputs.source_branch }}/feeds.conf.default
  CONFIG_FILE: config/${{ inputs.source_branch }}/config
  DIY_P1_SH: config/${{ inputs.source_branch }}/diy-part1.sh
  DIY_P2_SH: config/${{ inputs.source_branch }}/diy-part2.sh
  TZ: Etc/UTC
  CCACHE_DIR: /builder/openwrt/.ccache

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Init environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
          python3 python3-distutils rsync unzip zlib1g-dev file wget

      - name: Clone OpenWrt source
        run: |
          cd $GITHUB_WORKSPACE
          git clone https://github.com/immortalwrt/immortalwrt openwrt

      - name: Load config
        run: |
          cd openwrt
          [[ -f "../${CONFIG_FILE}" ]] && cp ../${CONFIG_FILE} .config || true

      - name: Update feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Download packages
        run: |
          cd openwrt
          make defconfig
          make download -j8

      - name: Compile firmware
        run: |
          cd openwrt
          make -j$(nproc) || make -j1 V=s

      # ========================= FIXED PART =========================
      - name: Collect firmware output
        id: clean
        run: |
          cd openwrt

          mkdir -p output

          echo "=== FIND FIRMWARE FILES ==="
          find bin/targets -type f || true

          echo "=== COPY FILES ==="
          find bin/targets -type f \( \
            -name "*.bin" -o \
            -name "*.img.gz" -o \
            -name "*.tar.gz" \
          \) -exec cp -f {} output/ \; || true

          cp .config output/ 2>/dev/null || true

          echo "=== OUTPUT ==="
          ls -lah output

          echo "status=success" >> $GITHUB_OUTPUT

      - name: Upload Release
        if: ${{ steps.clean.outputs.status == 'success' }}
        uses: ncipollo/release-action@main
        with:
          tag: openwrt-build
          artifacts: openwrt/output/*
          allowUpdates: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Package firmware
        if: ${{ steps.clean.outputs.status == 'success' }}
        uses: ophub/amlogic-s9xxx-openwrt@main
        with:
          openwrt_path: openwrt/output/
          openwrt_board: ${{ inputs.openwrt_board }}
          openwrt_kernel: ${{ inputs.openwrt_kernel }}
