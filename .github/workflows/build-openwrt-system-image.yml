name: Build OpenWrt system image

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      source_branch:
        description: "Select the source branch"
        required: false
        default: "openwrt_main"
        type: choice
        options:
          - openwrt_main
          - lede_master
          - immortalwrt_master

      openwrt_board:
        description: "Select device board"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - amlogic
          - rockchip
          - s905x
          - s912
          - s922x

      openwrt_kernel:
        description: "Select kernel version"
        required: false
        default: "6.12.y_6.18.y"
        type: choice
        options:
          - 5.10.y
          - 5.15.y
          - 6.1.y
          - 6.6.y
          - 6.12.y
          - 6.18.y
          - 6.12.y_6.18.y

env:
  TZ: Etc/UTC

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Init environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk \
          gcc-multilib gettext git libncurses5-dev libssl-dev python3 \
          rsync unzip zlib1g-dev file wget

      - name: Clone ImmortalWrt
        run: |
          git clone https://github.com/immortalwrt/immortalwrt openwrt

      - name: Load config
        run: |
          cd openwrt
          [[ -f "../config" ]] && cp ../config .config || true

      - name: Update feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Download packages
        run: |
          cd openwrt
          make defconfig
          make download -j8

      - name: Compile firmware
        run: |
          cd openwrt
          make -j$(nproc) || make -j1 V=s

      # ===================== FIXED IMMORTALWRT PART =====================
      - name: Collect firmware output
        id: clean
        run: |
          cd openwrt

          mkdir -p output

          echo "=============================="
          echo "🔍 BIN TARGET CHECK"
          echo "=============================="
          find bin/targets -type f || true

          echo "=============================="
          echo "📦 SEARCH FIRMWARE"
          echo "=============================="

          FILES=$(find bin/targets -type f \( \
            -name "*.bin" -o \
            -name "*.img.gz" -o \
            -name "*.tar.gz" \
          \))

          if [ -z "$FILES" ]; then
            echo "❌ NO FIRMWARE FOUND - BUILD FAILED"
            exit 1
          fi

          echo "$FILES" | xargs -I {} cp -f {} output/

          cp .config output/ 2>/dev/null || true

          echo "=============================="
          echo "📊 OUTPUT RESULT"
          echo "=============================="
          ls -lah output

          echo "status=success" >> $GITHUB_OUTPUT

      - name: Upload Release
        if: ${{ steps.clean.outputs.status == 'success' }}
        uses: ncipollo/release-action@main
        with:
          tag: openwrt-build
          artifacts: openwrt/output/*
          allowUpdates: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Package firmware
        if: ${{ steps.clean.outputs.status == 'success' }}
        uses: ophub/amlogic-s9xxx-openwrt@main
        with:
          openwrt_path: openwrt/output/
          openwrt_board: ${{ inputs.openwrt_board }}
          openwrt_kernel: ${{ inputs.openwrt_kernel }}
