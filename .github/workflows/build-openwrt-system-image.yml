name: Build OpenWrt system image (GitHub Runner)

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      source_branch:
        description: "Select source"
        required: false
        default: "immortalwrt_master"
        type: choice
        options:
          - openwrt_main
          - lede_master
          - immortalwrt_master

      openwrt_board:
        description: "Board"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - amlogic
          - s905x
          - s912
          - s922x

      openwrt_kernel:
        description: "Kernel"
        required: false
        default: "6.12.y_6.18.y"
        type: choice
        options:
          - 5.10.y
          - 5.15.y
          - 6.1.y
          - 6.6.y
          - 6.12.y
          - 6.18.y
          - 6.12.y_6.18.y

env:
  TZ: Asia/Jakarta

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk \
          gcc-multilib gettext git libncurses5-dev libssl-dev python3 \
          rsync unzip zlib1g-dev file wget curl

      - name: Clone ImmortalWrt
        run: |
          git clone --depth=1 https://github.com/immortalwrt/immortalwrt openwrt

      - name: Load config
        run: |
          cd openwrt
          [[ -f "../config" ]] && cp ../config .config || true

      - name: Update feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Download packages
        run: |
          cd openwrt
          make defconfig
          make download -j8

      - name: Compile firmware
        run: |
          cd openwrt
          make -j$(nproc) || make -j1 V=s

      # ================= OUTPUT FIX =================
      - name: Collect firmware output
        id: clean
        run: |
          cd openwrt

          mkdir -p output

          echo "🔍 FIND BIN"
          find bin/targets -type f || true

          FILES=$(find bin/targets -type f \( \
            -name "*.bin" -o \
            -name "*.img.gz" -o \
            -name "*.tar.gz" \
          \))

          if [ -z "$FILES" ]; then
            echo "❌ NO FIRMWARE FOUND"
            exit 1
          fi

          echo "$FILES" | xargs -I {} cp -f {} output/

          cp .config output/ 2>/dev/null || true

          ls -lah output

          echo "status=success" >> $GITHUB_OUTPUT

      - name: Upload Release
        if: ${{ steps.clean.outputs.status == 'success' }}
        uses: ncipollo/release-action@main
        with:
          tag: openwrt-github
          artifacts: openwrt/output/*
          allowUpdates: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Package firmware
        if: ${{ steps.clean.outputs.status == 'success' }}
        uses: ophub/amlogic-s9xxx-openwrt@main
        with:
          openwrt_path: openwrt/output/
          openwrt_board: ${{ inputs.openwrt_board }}
          openwrt_kernel: ${{ inputs.openwrt_kernel }}
