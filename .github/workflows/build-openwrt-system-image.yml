name: Build OpenWrt system image (Linux Mint Runner)

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      source_branch:
        description: "Select source"
        required: false
        default: "immortalwrt_master"
        type: choice
        options:
          - openwrt_main
          - lede_master
          - immortalwrt_master

      openwrt_board:
        description: "Board"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - amlogic
          - s905x
          - s912
          - s922x

      openwrt_kernel:
        description: "Kernel"
        required: false
        default: "6.12.y_6.18.y"
        type: choice
        options:
          - 5.10.y
          - 5.15.y
          - 6.1.y
          - 6.6.y
          - 6.12.y
          - 6.18.y
          - 6.12.y_6.18.y

env:
  TZ: Asia/Jakarta

jobs:
  build:
    # ✅ khusus Linux Mint runner
    runs-on: Linux-Mint

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # ===================== FIX ENV LINUX MINT =====================
      - name: Install dependencies (Linux Mint safe)
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk \
          gcc-multilib gettext git libncurses5-dev libssl-dev python3 \
          rsync unzip zlib1g-dev file wget curl

      # ===================== CLEAN SOURCE =====================
      - name: Clone ImmortalWrt
        run: |
          rm -rf openwrt
          git clone https://github.com/immortalwrt/immortalwrt openwrt

      - name: Load config
        run: |
          cd openwrt
          [[ -f "../config" ]] && cp ../config .config || true

      # ===================== FEEDS =====================
      - name: Update feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Download packages
        run: |
          cd openwrt
          make defconfig
          make download -j8

      # ===================== BUILD =====================
      - name: Compile firmware
        run: |
          cd openwrt
          make -j$(nproc) || make -j1 V=s

      # ===================== FIXED OUTPUT =====================
      - name: Collect firmware output
        id: clean
        run: |
          cd openwrt

          mkdir -p output

          echo "=============================="
          echo "🔍 CHECK TARGET FILES"
          echo "=============================="
          find bin/targets -type f || true

          echo "=============================="
          echo "📦 COLLECT FIRMWARE"
          echo "=============================="

          FILES=$(find bin/targets -type f \( \
            -name "*.bin" -o \
            -name "*.img.gz" -o \
            -name "*.tar.gz" \
          \))

          if [ -z "$FILES" ]; then
            echo "❌ BUILD FAILED: NO FIRMWARE OUTPUT"
            exit 1
          fi

          echo "$FILES" | xargs -I {} cp -f {} output/

          cp .config output/ 2>/dev/null || true

          echo "=============================="
          echo "📊 OUTPUT RESULT"
          echo "=============================="
          ls -lah output

          echo "status=success" >> $GITHUB_OUTPUT

      # ===================== RELEASE =====================
      - name: Upload Release
        if: ${{ steps.clean.outputs.status == 'success' }}
        uses: ncipollo/release-action@main
        with:
          tag: openwrt-linux-mint
          artifacts: openwrt/output/*
          allowUpdates: true
          token: ${{ secrets.GITHUB_TOKEN }}

      # ===================== PACKAGING =====================
      - name: Package firmware
        if: ${{ steps.clean.outputs.status == 'success' }}
        uses: ophub/amlogic-s9xxx-openwrt@main
        with:
          openwrt_path: openwrt/output/
          openwrt_board: ${{ inputs.openwrt_board }}
          openwrt_kernel: ${{ inputs.openwrt_kernel }}
